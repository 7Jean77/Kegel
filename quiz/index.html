      display: inline-block;
      background: #fdecea;
      color: #c0392b;
      font-size: 12px;
      font-weight: 600;

      color: #333;

    .option:hover {

    .option.selected {
      border-color: #c0392b;

      margin-bottom: 24px;

    .review {

      padding: 24px;
      text-align: center;
      margin-bottom: 24px;

      height: 24px;

      font-weight: 700;

    .btn {

      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn-pulse {
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(192,57,43,0.5); }

    .btn-pulse-green {

    }
    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading screen */
    .loading-screen {
      text-align: center;
      padding: 48px 28px;

    .loading-spinner {
      width: 56px;
      height: 56px;
      border: 4px solid #eee;
      border-top-color: #c0392b;
      border-radius: 50%;

    .loading-phrase {

      margin-bottom: 10px;

    .loading-bar {

    .loading-bar-fill {

    .intro-logo {

    .intro-body {

      padding: 16px 28px;
      color: #111;
    }
    .intro-title span { color: #c0392b; }
    .intro-age-label {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      margin-bottom: 14px;
      text-align: left;
    }

      ]

    { type: "loading" },
    { type: "midresult" },
    { type: "result" },
  ];

  let current = 0;
  const totalQuestions = steps.filter(s => s.type === "choice" || s.type === "scale").length;

  function getQuestionIndex() {
    let count = 0;
    for (let i = 0; i < current; i++) {
      if (steps[i].type === "choice" || steps[i].type === "scale") count++;
    }
    return count;
  }

  function updateProgress() {
    const step = steps[current];
    const wrap = document.getElementById("progressWrap");
    const label = document.getElementById("progressLabel");
    const fill = document.getElementById("progressFill");

    if (step.type === "result" || step.type === "intro" || step.type === "loading") {
      wrap.style.display = "none";
      return;
    }

    wrap.style.display = "block";
    const pct = Math.round((current / (steps.length - 1)) * 100);
    fill.style.width = Math.max(pct, 5) + "%";

    if (step.type === "info") {
      label.textContent = "Curiosidade";
    } else {
      label.textContent = `Pergunta ${getQuestionIndex() + 1} de ${totalQuestions}`;
    }
  }

  function renderStep() {
    const step = steps[current];
    const card = document.getElementById("card");
    card.className = "card";
    card.style.background = "";
    card.style.color = "";
    document.body.style.background = "";
    document.getElementById("globalLogo").src = "BR_logo_white_bg.webp";
    updateProgress();
    updateStickyBtn();

    if (step.type === "intro") {
      card.className = "";
      card.innerHTML = `
        <div class="intro-screen">
          <h1 class="intro-title">Seu pau ficou <span>fraco</span>? Isso tem solução — e é mais <span>simples do que você pensa</span></h1>

              ${ageOptions.map((o, i) => `
                <button class="option${answers["age"] === i ? ' selected' : ''}" onclick="selectIntroAge(${i})">${o}</button>
              `).join("")}
            </div>
            <p style="font-size:13px; font-weight:600; color:#555; margin-top:24px; margin-bottom:8px; text-align:center; text-transform:uppercase; letter-spacing:0.08em;">Fontes:</p>
            <img src="img_source_logos_bw.webp" alt="Fontes" width="1029" height="441" loading="lazy" style="width:100%; height:auto; border-radius:10px;" />
          </div>
        </div>
      `;
      return;
    }

    if (step.type === "choice") {
      card.innerHTML = `
        <div class="badge">Pergunta ${getQuestionIndex() + 1}</div>
        <h2>${step.question}</h2>
        <div class="subtitle">Selecione uma opção abaixo</div>
        <div class="options">
          ${step.options.map((o, i) => `
            <button class="option${answers[step.id] === i ? ' selected' : ''}" onclick="selectOption('${step.id}', ${i})">${o}</button>
          `).join("")}
        </div>
      `;
    }

    else if (step.type === "scale") {
      card.innerHTML = `
        <div class="badge">Pergunta ${getQuestionIndex() + 1}</div>
        <h2>${step.question}</h2>
        <div class="subtitle">Avalie de 1 a 5</div>
        <div class="scale-wrap">
          <div class="scale-labels"><span>${step.labelLeft}</span><span>${step.labelRight}</span></div>
          <div class="scale-buttons">
            ${[1,2,3,4,5].map(n => `
              <button class="scale-btn${answers[step.id] === n ? ' selected' : ''}" onclick="selectScale('${step.id}', ${n})">${n}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    else if (step.type === "info") {
      if (step.darkbg) {
        card.style.background = "#000";
        card.style.color = "#fff";
        document.body.style.background = "#000";
        document.getElementById("globalLogo").src = "BR_logo_dark_bg.webp";
      } else {
        card.style.background = "";
        card.style.color = "";
        document.body.style.background = "";
        document.getElementById("globalLogo").src = "BR_logo_white_bg.webp";
      }
      const reviewsHtml = (step.reviews || []).map(r => `
        <div class="review" style="${step.darkbg ? 'background:#2a2a2a; border:none; color:#fff;' : ''}">
          ${r.photo ? `
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <img src="${r.photo}" alt="${r.author}" style="width:48px; height:48px; border-radius:50%; object-fit:cover; flex-shrink:0;" />

              ${r.age ? `<div style="font-size:12px; color:#aaa;">${r.age}</div>` : ""}

          <div class="stars">★★★★★</div>
          <div class="author" style="${step.darkbg ? 'color:#aaa;' : ''}">${r.author}</div>

          <div class="text" style="${step.darkbg ? 'color:#ddd;' : ''}">${r.text}</div>
        </div>
      `).join("");

      const statHtml = step.stat ? `
        <div class="stat-big">
          <div class="number">${step.stat}</div>
          <div class="desc">${step.statDesc}</div>
        </div>
      ` : "";

      card.innerHTML = `
        ${step.badge ? `<div style="${step.darkbg ? 'text-align:center; margin-bottom:0;' : ''}"><div class="badge" style="${step.darkbg ? 'background:#c0392b; color:#fff; display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px;' : ''}">${step.badge}</div></div>` : ""}

  <span style="font-size:22px;">🛡️</span>
  <div>
    <p style="font-size:11px; color:#aaa; margin:0;">Fonte:</p>
    <p style="font-size:14px; color:#fff; font-weight:700; margin:0;">Nuffield Somerset Hospital</p>
  </div>
</div>` : ""}
        ${step.title && !step.hidetitle ? `<h2>${step.title}</h2>` : ""}
        ${step.video ? `<video src="${step.video}" ${step.videoPoster ? `poster="${step.videoPoster}"` : ""} autoplay loop muted playsinline preload="auto" style="width:100%; border-radius:12px; margin:16px 0;"></video>` : ""}

    else if (step.type === "loading") {
      card.innerHTML = `

      `;

  function updateStickyBtn() {
    const step = steps[current];
    const btn = document.getElementById("stickyBtn");
    const inner = document.getElementById("stickyBtnInner");
    if (step.type === "loading" || step.type === "result") {
      btn.style.display = "none";
      return;
    }
    if (step.type === "midresult") {
      btn.style.display = "block";
      inner.textContent = "Quero resolver isso agora →";
      inner.disabled = false;
      return;
    }
    if (step.type === "choice" || step.type === "scale" || step.type === "intro") {
      btn.style.display = "none";
      return;
    }
    btn.style.display = "block";
    if (step.type === "info") {
      inner.textContent = "Entendido, continuar";
      inner.disabled = false;
    }
  }

  function stickyNext() {

  // Countdown timer (15 min, shared across all .countdown-timer elements)
  let _cdSecs = 15 * 60;
  function _updateCountdown() {
    const m = String(Math.floor(_cdSecs / 60)).padStart(2, '0');
    const s = String(_cdSecs % 60).padStart(2, '0');
    document.querySelectorAll('.countdown-timer').forEach(el => el.textContent = m + ':' + s);
    if (_cdSecs > 0) _cdSecs--;
  }
  setInterval(_updateCountdown, 1000);

    answers[id] = value;
    document.querySelectorAll(".scale-btn").forEach((el, i) => {
