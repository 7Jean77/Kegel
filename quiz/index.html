<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plano de Kegel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c0392b, #e74c3c);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 28px 96px;
      animation: fadeIn 0.35s ease;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: #fdecea;
      color: #c0392b;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
      color: #111;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option {
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      font-size: 15px;
      color: #333;
      transition: all 0.2s;
      text-align: left;
    }
    .option:hover {
      border-color: #e74c3c;
      background: #fff5f5;
      color: #111;
    }
    .option.selected {
      border-color: #c0392b;
      background: #fdecea;
      color: #c0392b;
      font-weight: 600;
    }

    /* Scale */
    .scale-wrap {
      margin-bottom: 24px;
    }
    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }
    .scale-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .scale-btn {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      background: #fff;
      color: #333;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .scale-btn:hover {
      border-color: #e74c3c;
      background: #fff5f5;
    }
    .scale-btn.selected {
      border-color: #c0392b;
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      color: #fff;
    }

    /* Info card */
    .info-box {
      background: #fff5f5;
      border-left: 4px solid #e74c3c;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    /* Stat highlight */
    .stat-big {
      text-align: center;
      margin-bottom: 24px;
    }
    .stat-big .number {
      font-size: 64px;
      font-weight: 800;
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .stat-big .desc {
      font-size: 15px;
      color: #777;
      margin-top: 8px;
      line-height: 1.5;
    }

    /* Reviews */
    .reviews {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .review {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 14px 16px;
    }
    .review .stars { color: #f59e0b; font-size: 13px; margin-bottom: 4px; }
    .review .author { font-size: 12px; color: #999; margin-bottom: 6px; }
    .review .text { font-size: 13px; color: #555; line-height: 1.5; }

    /* Result */
    .result-box {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 24px;
      color: #fff;
    }
    .result-box .goal { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
    .result-box .deadline { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .result-box .sub { font-size: 13px; color: rgba(255,255,255,0.75); }
    .compat {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      justify-content: center;
    }
    .compat .label { font-size: 13px; color: rgba(255,255,255,0.8); }
    .compat .value { font-size: 14px; font-weight: 700; color: #fff; }

    /* Benefits list */
    .benefits {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }
    .benefits li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #333;
    }
    .benefits li::before {
      content: "✓";
      width: 24px;
      height: 24px;
      background: #fdecea;
      color: #c0392b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading screen */
    .loading-screen {
      text-align: center;
      padding: 48px 28px;
    }
    .loading-spinner {
      width: 56px;
      height: 56px;
      border: 4px solid #eee;
      border-top-color: #c0392b;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 32px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-phrase {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
      min-height: 28px;
      transition: opacity 0.4s;
    }
    .loading-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 28px;
    }
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c0392b, #e74c3c);
      border-radius: 99px;
      width: 0%;
      transition: width 1.2s ease;
    }

    .note {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      margin-top: 14px;
    }

    /* Intro screen */
    .intro-screen {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      animation: fadeIn 0.35s ease;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .intro-logo {
      display: block;
      max-height: 70px;
      margin: 24px auto 16px;
      object-fit: contain;
    }
    .intro-img {
      width: 100%;
      display: block;
      max-height: 300px;
      object-fit: cover;
    }
    .intro-benefits-img {
      width: 100%;
      display: block;
    }
    .intro-body {
      padding: 24px 28px 32px;
      text-align: center;
    }
    .intro-title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.3;
      text-align: center;
      padding: 16px 28px;
      color: #111;
    }
    .intro-title span { color: #c0392b; }
    .intro-age-label {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      margin-bottom: 14px;
      text-align: left;
    }
  </style>
</head>
<body>
<div id="stickyBtn" style="display:none; position:fixed; bottom:0; left:0; right:0; padding:16px 20px; background:transparent; z-index:999;">
  <button class="btn" id="stickyBtnInner" style="max-width:480px; margin:0 auto; display:block;" onclick="stickyNext()">Continuar</button>
</div>

<div class="container">
  <div style="text-align:center; margin-bottom:16px;">
    <img id="globalLogo" src="BR_logo_white_bg.webp" alt="Logo" style="max-height:60px; object-fit:contain;" />
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Pergunta 1 de 8</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:5%"></div></div>
  </div>
  <div id="card"></div>
</div>

<script>
  const answers = {};
  const ageOptions = ["25–35", "35–45", "45–55", "55+"];

  const steps = [
    { type: "intro" },
    { type: "choice", id: "goal", question: "Escolha seu objetivo principal", options: ["Melhorar a função erétil", "Melhorar o controle da ejaculação", "Maximizar o bem-estar sexual", "Aprimorar todos os itens acima"] },
    { type: "choice", id: "erection_freq", question: "Com que frequência você tem problemas de ereção?", options: ["Nunca", "Raramente", "Muitas vezes", "O tempo todo", "Prefiro não responder"] },
    {
      type: "info", id: "info1",
      badge: "",
      title: "A ereção começa nos músculos", hidetitle: true, darkbg: true,
      pretitle: `<span style="color:#fff;">A <span style="text-decoration:underline;">Qualidade da Ereção</span> depende da força dos</span> <span style="color:#22c55e;">Músculos do Assoalho Pélvico (MAP)</span>`,
      body: "Músculos do Assoalho Pélvico (MAP) mais fortes ajudam a preencher e reter mais sangue no órgão masculino, o que leva a ereções mais intensas e duradouras.",
      video: "video_ED_s1.mp4",
    },
    { type: "scale", id: "erection_quality", question: "Quão rígida é sua ereção durante o sexo?", labelLeft: "Não é rígida", labelRight: "Muito rígida" },
    { type: "scale", id: "relationship_impact", question: "O quanto os problemas de ereção afetam seu relacionamento?", labelLeft: "Não afetam", labelRight: "Afetam muito" },
    {
      type: "info", id: "info2",
      darkbg: true,
      badge: "✔ Fato científico",
      title: "Exercícios de Kegel funcionam", hidetitle: true,
      pretitle: `<span style="color:#fff;">Os <span style="text-decoration:underline;">Exercícios Kegel</span> fortalecem os Músculos do Assoalho Pélvico (MAP), o que melhora efetivamente a</span> <span style="color:#22c55e;">Ereção</span>`,
      pretitleImg: "BR_img_erection_kegels_nokegels.avif",
      body: "",
      reviews: [
        { author: "Marcelo", text: "Após 4 semanas de exercícios de Kegel, não tenho mais problemas para obter e manter uma ereção. Se você está com dificuldades como eu estava, experimente estes exercícios." },
      ]
    },
    { type: "choice", id: "ejac_freq", question: "Com que frequência você ejacula antes do que gostaria?", options: ["Nunca", "Raramente", "Muitas vezes", "O tempo todo", "Prefiro não responder"] },
    { type: "choice", id: "duration", question: "Quanto tempo costuma durar sua relação sexual?", options: ["Menos de 2 minutos", "2 a 7 minutos", "7 a 15 minutos", "15 minutos ou mais"] },
    { type: "loading" },
    { type: "result" },
  ];

  let current = 0;
  const totalQuestions = steps.filter(s => s.type === "choice" || s.type === "scale").length;

  function getQuestionIndex() {
    let count = 0;
    for (let i = 0; i < current; i++) {
      if (steps[i].type === "choice" || steps[i].type === "scale") count++;
    }
    return count;
  }

  function updateProgress() {
    const step = steps[current];
    const wrap = document.getElementById("progressWrap");
    const label = document.getElementById("progressLabel");
    const fill = document.getElementById("progressFill");

    if (step.type === "result" || step.type === "intro" || step.type === "loading") {
      wrap.style.display = "none";
      return;
    }

    wrap.style.display = "block";
    const pct = Math.round((current / (steps.length - 1)) * 100);
    fill.style.width = Math.max(pct, 5) + "%";

    if (step.type === "info") {
      label.textContent = "Curiosidade";
    } else {
      label.textContent = `Pergunta ${getQuestionIndex() + 1} de ${totalQuestions}`;
    }
  }

  function renderStep() {
    const step = steps[current];
    const card = document.getElementById("card");
    card.className = "card";
    card.style.background = "";
    card.style.color = "";
    document.body.style.background = "";
    document.getElementById("globalLogo").src = "BR_logo_white_bg.webp";
    updateProgress();
    updateStickyBtn();

    if (step.type === "intro") {
      card.className = "";
      card.innerHTML = `
        <div class="intro-screen">
          <h1 class="intro-title">Adquira Seu Plano De <span>Bem-Estar Sexual</span></h1>
          <img class="intro-img" src="happy_couple.webp" alt="Casais felizes" />
          <img class="intro-benefits-img" src="BR_benefits.webp" alt="Benefícios" />
          <div class="intro-body">
            <div class="intro-age-label">Quantos anos você tem?</div>
            <div class="options">
              ${ageOptions.map((o, i) => `
                <button class="option${answers["age"] === i ? ' selected' : ''}" onclick="selectIntroAge(${i})">${o}</button>
              `).join("")}
            </div>
            <p style="font-size:13px; font-weight:600; color:#555; margin-top:24px; margin-bottom:8px; text-align:center; text-transform:uppercase; letter-spacing:0.08em;">Fontes:</p>
            <img src="img_source_logos_bw.webp" alt="Fontes" style="width:100%; border-radius:10px;" />
            <ol style="margin-top:20px; padding-left:18px; text-align:left; display:flex; flex-direction:column; gap:14px;">
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">G. Dorey, M. Speakman, R. Feneley, A. Swinkels, C. Dunn, and P. Ewings, (2004). "Randomised controlled trial of pelvic floor muscle exercises and manometric biofeedback for erectile dysfunction"</strong><br><em>British Journal of General Practice</em> 2004 Nov;54(508):819-25 PMID:15527607</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">H. A. Feldman, I. Goldstein, D. G. Hatzichristou, R. J. Krane, and J. B. McKinlay, (1994). "Impotence and its medical and psychosocial correlates: results of the Massachusetts Male Aging Study"</strong><br><em>The Journal of Urology</em> 1994 Jan;151(1):54–61 PMID:8254833</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">M. Crowdis, S. W. Leslie, and S. Nazir, (2023). "Premature Ejaculation"</strong><br><em>StatPearls Publishing</em> 2023 May 30. PMID: 31536307</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">J. Gao, X. Zhang, P. Su, K. Shi, D. Tang, Z. Hao, J. Zhou, and C. Liang, (2014). "Prevalence and impact of premature ejaculation in outpatients complaining of ejaculating prematurely: using the instruments of intravaginal ejaculatory latency time and patient-reported outcome measures"</strong><br><em>International Journal of Impotence Research</em> 2014 May–Jun;26(3):94–99 PMID:24384563</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">A. L. Pastore, G. Palleschi, A. Fuschi, C. Maggioni, R. Rago, A. Zucchi, E. Costantini, and A. Carbone, (2014). "Pelvic floor muscle rehabilitation for patients with lifelong premature ejaculation: a novel therapeutic approach"</strong><br><em>Therapeutic Advances in Urology</em> 2014 Jun;6(3):83–88 PMID:24883105</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">A. L. Siegel, (2014). "Pelvic floor muscle training in males: practical applications"</strong><br><em>The Journal of Urology</em> 2014 Jul;84(1):1–7 PMID:24821468</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">H. A. Feldman, I. Goldstein, D. G. Hatzichristou, R. J. Krane, and J. B. McKinlay, (1994). "Impotence and its medical and psychosocial correlates: results of the Massachusetts Male Aging Study"</strong><br><em>The Journal of Urology</em> 1994 Jan;151(1):54–61 PMID:8254833</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">A. L. Pastore, G. Palleschi, A. Leto, L. Pacini, F. Iori, C. Leonardo, and A. Carbone, (2012). "A prospective randomized study to compare pelvic floor rehabilitation and dapoxetine for treatment of lifelong premature ejaculation"</strong><br><em>International Journal of Andrology</em> 2012 Aug;35(4):528–533 PMID:22320846</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">D. Cohen, J. Gonzalez, and I. Goldstein, (2016). "The Role of Pelvic Floor Muscles in Male Sexual Dysfunction and Pelvic Pain"</strong><br><em>Sexual Medicine Reviews</em> 2016 Jan;4(1):53–62 PMID:27872005</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">P. Capogrosso, M. Colicchia, E. Ventimiglia, G. Castagna, M. C. Clementi, N. Suardi, F. Castiglione, A. Briganti, F. Cantiello, R. Damiano, F. Montorsi, and A. Salonia, (2013). "One patient out of four with newly diagnosed erectile dysfunction is a young man—worrisome picture from the everyday clinical practice"</strong><br><em>The Journal of Sexual Medicine</em> 2013 Jul;10(7):1833–1841 PMID:23651423</li>
              <li style="font-size:12px; color:#777; line-height:1.6;"><strong style="color:#222;">A. L. Pastore, G. Palleschi, A. Fuschi, Y. Al Salhi, A. Zucchi, G. Bozzini, E. Illiano, E. Costantini, and A. Carbone, (2018). "Pelvic muscle floor rehabilitation as a therapeutic option in lifelong premature ejaculation: long-term outcomes"</strong><br><em>Asian Journal of Andrology</em> 2018 Nov–Dec;20(6):572–575 PMID:29974885</li>
            </ol>
          </div>
        </div>
      `;
      return;
    }

    if (step.type === "choice") {
      card.innerHTML = `
        <div class="badge">Pergunta ${getQuestionIndex() + 1}</div>
        <h2>${step.question}</h2>
        <div class="subtitle">Selecione uma opção abaixo</div>
        <div class="options">
          ${step.options.map((o, i) => `
            <button class="option${answers[step.id] === i ? ' selected' : ''}" onclick="selectOption('${step.id}', ${i})">${o}</button>
          `).join("")}
        </div>
      `;
    }

    else if (step.type === "scale") {
      card.innerHTML = `
        <div class="badge">Pergunta ${getQuestionIndex() + 1}</div>
        <h2>${step.question}</h2>
        <div class="subtitle">Avalie de 1 a 5</div>
        <div class="scale-wrap">
          <div class="scale-labels"><span>${step.labelLeft}</span><span>${step.labelRight}</span></div>
          <div class="scale-buttons">
            ${[1,2,3,4,5].map(n => `
              <button class="scale-btn${answers[step.id] === n ? ' selected' : ''}" onclick="selectScale('${step.id}', ${n})">${n}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    else if (step.type === "info") {
      if (step.darkbg) {
        card.style.background = "#000";
        card.style.color = "#fff";
        document.body.style.background = "#000";
        document.getElementById("globalLogo").src = "BR_logo_dark_bg.webp";
      } else {
        card.style.background = "";
        card.style.color = "";
        document.body.style.background = "";
        document.getElementById("globalLogo").src = "BR_logo_white_bg.webp";
      }
      const reviewsHtml = (step.reviews || []).map(r => `
        <div class="review" style="${step.darkbg ? 'background:#2a2a2a; border:none; color:#fff;' : ''}">
          <div class="stars">★★★★★</div>
          <div class="author" style="${step.darkbg ? 'color:#aaa;' : ''}">${r.author}</div>
          <div class="text" style="${step.darkbg ? 'color:#ddd;' : ''}">${r.text}</div>
        </div>
      `).join("");

      const statHtml = step.stat ? `
        <div class="stat-big">
          <div class="number">${step.stat}</div>
          <div class="desc">${step.statDesc}</div>
        </div>
      ` : "";

      card.innerHTML = `
        ${step.badge ? `<div style="${step.darkbg ? 'text-align:center; margin-bottom:0;' : ''}"><div class="badge" style="${step.darkbg ? 'background:#c0392b; color:#fff; display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px;' : ''}">${step.badge}</div></div>` : ""}
        ${step.pretitle ? `<p style="font-size:17px; font-weight:700; color:${step.darkbg ? '#ccc' : '#888'}; margin-bottom:16px; line-height:1.5; text-align:center;">${step.pretitle}</p>` : ""}
        ${step.pretitleImg ? `<img src="${step.pretitleImg}" style="width:100%; border-radius:12px; margin-bottom:10px;" /><div style="display:flex; align-items:center; gap:12px; background:#2a2a2a; border-radius:10px; padding:12px 16px; margin-bottom:16px;">
  <span style="font-size:22px;">🛡️</span>
  <div>
    <p style="font-size:11px; color:#aaa; margin:0;">Fonte:</p>
    <p style="font-size:14px; color:#fff; font-weight:700; margin:0;">Nuffield Somerset Hospital</p>
  </div>
</div>` : ""}
        ${step.title && !step.hidetitle ? `<h2>${step.title}</h2>` : ""}
        ${step.video ? `<video src="${step.video}" autoplay loop muted playsinline style="width:100%; border-radius:12px; margin:16px 0;"></video>` : ""}
        <div class="info-box" style="${step.darkbg ? 'background:transparent; border:none; color:#ccc; text-align:center;' : ''}">${step.body}</div>
        ${statHtml}
        ${reviewsHtml ? `<div class="reviews">${reviewsHtml}</div>` : ""}
      `;
    }

    else if (step.type === "loading") {
      card.innerHTML = `
        <div class="loading-screen">
          <div class="loading-spinner"></div>
          <div class="loading-phrase" id="loadingPhrase">Analisando suas respostas...</div>
          <div class="loading-bar"><div class="loading-bar-fill" id="loadingFill"></div></div>
        </div>
      `;
      const phrases = [
        "Analisando suas respostas...",
        "Calculando nível de compatibilidade...",
        "Criando plano personalizado...",
        "Quase pronto..."
      ];
      const fill = document.getElementById("loadingFill");
      const phraseEl = document.getElementById("loadingPhrase");
      let i = 0;
      fill.style.width = "20%";
      const interval = setInterval(() => {
        i++;
        if (i < phrases.length) {
          phraseEl.style.opacity = "0";
          setTimeout(() => {
            phraseEl.textContent = phrases[i];
            phraseEl.style.opacity = "1";
          }, 300);
          fill.style.width = ((i + 1) / phrases.length * 100) + "%";
        } else {
          clearInterval(interval);
          setTimeout(() => nextStep(), 600);
        }
      }, 1400);
    }

    else if (step.type === "result") {
      document.getElementById("stickyBtn").style.display = "block";
      const age = ageOptions[answers["age"]] || "25–35";
      const goalIdx = answers["goal"];
      const goals = ["Melhorar a função erétil", "Melhorar o controle da ejaculação", "Maximizar o bem-estar sexual", "Aprimorar ambos os itens"];
      const goal = goals[goalIdx != null ? goalIdx : 3];

      card.innerHTML = `
        <div class="badge">Seu plano está pronto!</div>
        <h2>Parabéns por priorizar sua saúde sexual</h2>
        <div class="subtitle">Com base nas suas respostas, criamos um plano de Kegel personalizado para você.</div>

        <div class="result-box">
          <div class="goal">${goal}</div>
          <div class="deadline">Resultados em até 5 semanas</div>
          <div class="sub">com apenas 5 minutos por dia</div>
          <div class="compat">
            <span class="label">Índice de compatibilidade:</span>
            <span class="value">Alto ✓</span>
          </div>
        </div>

        <video src="BR_video_graph_pp2.mp4" autoplay loop muted playsinline style="width:100%; border-radius:12px; margin-bottom:16px;"></video>

        <div class="stat-big">
          <div class="number">87,1%</div>
          <div class="desc">dos homens de ${age} anos relatam melhorias notáveis seguindo o Plano de Kegel.</div>
        </div>

        <ul class="benefits">
          <li>Função erétil aprimorada</li>
          <li>Maior controle da ejaculação</li>
          <li>Saúde da próstata fortalecida</li>
          <li>Mais confiança e bem-estar</li>
          <li>Felicidade no relacionamento</li>
        </ul>

        <p style="font-size:15px; font-weight:700; color:#111; margin-bottom:12px;">Avaliações de clientes:</p>
        <div class="reviews">
          <div class="review">
            <div class="stars">★★★★★</div>
            <div class="author">Fernando</div>
            <div class="text">Segui este plano de exercícios de Kegel e agora meu desempenho está no auge. Pessoal, isso realmente faz a diferença, não percam essa oportunidade.</div>
          </div>
          <div class="review">
            <div class="stars">★★★★★</div>
            <div class="author">Joelson</div>
            <div class="text">Ao chegar aos 50 anos, pensei que meus melhores dias tinham acabado. Mas graças ao Kegel, me sinto como se tivesse 20 anos de novo!</div>
          </div>
          <div class="review">
            <div class="stars">★★★★★</div>
            <div class="author">Edson</div>
            <div class="text">Estou fazendo exercícios de Kegel há duas semanas e realmente aumentei minha resistência, me sinto mais confiante com minha parceira. Você também deveria experimentar os exercícios de Kegel.</div>
          </div>
        </div>

        <p class="note" style="margin-bottom:80px;">*Estatísticas de pesquisa interna · Equipamento: não necessário</p>
      `;
    }
  }

  function updateStickyBtn() {
    const step = steps[current];
    const btn = document.getElementById("stickyBtn");
    const inner = document.getElementById("stickyBtnInner");
    if (step.type === "loading" || step.type === "result") {
      btn.style.display = step.type === "result" ? "block" : "none";
      if (step.type === "result") inner.textContent = "Começar meu plano agora";
      return;
    }
    btn.style.display = "block";
    if (step.type === "intro") {
      inner.textContent = "Começar agora →";
      inner.disabled = answers["age"] == null;
    } else if (step.type === "choice") {
      inner.textContent = "Continuar";
      inner.disabled = answers[step.id] == null;
    } else if (step.type === "scale") {
      inner.textContent = "Continuar";
      inner.disabled = answers[step.id] == null;
    } else if (step.type === "info") {
      inner.textContent = "Entendido, continuar";
      inner.disabled = false;
    }
  }

  function stickyNext() {
    nextStep();
  }

  function selectIntroAge(index) {
    answers["age"] = index;
    document.querySelectorAll(".intro-screen .option").forEach((el, i) => {
      el.classList.toggle("selected", i === index);
    });
    updateStickyBtn();
  }

  function selectOption(id, index) {
    answers[id] = index;
    document.querySelectorAll(".option").forEach((el, i) => {
      el.classList.toggle("selected", i === index);
    });
    updateStickyBtn();
  }

  function selectScale(id, value) {
    answers[id] = value;
    document.querySelectorAll(".scale-btn").forEach((el, i) => {
      el.classList.toggle("selected", i + 1 === value);
    });
    updateStickyBtn();
  }

  function nextStep() {
    if (current < steps.length - 1) {
      current++;
      renderStep();
    }
  }

  renderStep();
</script>
</body>
</html>
